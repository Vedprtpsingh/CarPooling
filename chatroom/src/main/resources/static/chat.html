<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Car Pooling Chat Room</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f4f4f4;
}

.container{
    width:500px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

#messages{
    height:300px;
    border:1px solid #ddd;
    overflow-y:auto;
    padding:10px;
    margin-bottom:10px;
}

input{
    width:70%;
    padding:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
    <h1>Car Pooling Chat</h1>

    <div id="messages"></div>

    <input type="text" id="sender" placeholder="Your Name">
    <br><br>

    <input type="text" id="message" placeholder="Type Message">

    <button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

    const sender=document.getElementById("sender").value;
    const message=document.getElementById("message").value;

    const response=await fetch("/api/messages",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            sender:sender,
            message:message
        })
    });

    const data=await response.json();

    loadMessages();

    document.getElementById("message").value="";
}

async function loadMessages(){

    const response=await fetch("/api/messages");

    const data=await response.json();

    let html="";

    data.forEach(msg=>{
        html+=`
            <p>
                <b>${msg.sender}</b> :
                ${msg.message}
            </p>
        `;
    });

    document.getElementById("messages").innerHTML=html;
}

loadMessages();

setInterval(loadMessages,2000);

</script>

</body>
</html>
